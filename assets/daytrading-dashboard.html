<!--
invest-committee 當沖 dashboard 模板（自包含、無外部資源、深淺色自適應、台股紅漲綠跌）

替換 token（外殼）：
  {{TITLE}} {{LEAD}}（資料截至＋來源）
  {{WARN_HTML}}  — 部位集中度警示 banner；無觸發時填空字串 ""
  {{CARD_A}} {{CARD_B}} — 每檔一張卡的完整 HTML（單股時 CARD_B 填 ""）
  {{COMPARE_SECTION}} — 雙股：並排對照表＋委員會裁定的完整 HTML；單股填 ""
  {{FOOT}} — 能力邊界聲明＋免責（見 stage-daytrading.md §6/§7）

每張卡（CARD_x）的 HTML 骨架（用下列 class；座標由分析層算，同波段 dashboard 作法）：
  <div class="card">
    <div class="stock-h"><span><span class="name">力成 6239</span>
      <span class="chip">半導體·封測</span><span class="chip ok">可當沖</span></span>
      <span class="price up">320.0 <span class="chg">+0.6%</span></span></div>
    <div class="verdict">震盪整理·無共振｜風險 <span class="badge b-y">71 🟡</span>｜持倉 −5.0%</div>
    <div class="sec-title">五維評分</div>
    <svg viewBox="0 0 300 300">…三層 radar-grid 框＋五 radar-axis 線＋一 data polygon
       ＋五 radar-lbl（含分數，如「基本面 75」）…</svg>
    <div class="sec-title">關鍵價位地圖</div>
    <svg viewBox="0 0 700 120"><line class="ladder-base" .../>
       …數個 <g class="tick"><line stroke="var(--red|green|accent|yellow)"/><text>標籤</text>
       <text class="p">價</text></g>（決戰帶用 yellow）…</svg>
    <div class="sec-title">指標看板</div>
    <div class="kv"><span class="k">…</span><span class="v">…</span>…</div>
    <div class="sec-title">當沖劇本</div>
    <div class="scen long|short">…觸發→目標→日內停損 ≤0.5×ATR…</div>
  </div>
  漲跌顏色一律：漲用 class "up"(紅)、跌用 "down"(綠)。缺資料填「未獲取」。
-->
<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root{
    --bg:#f6f7f9;--fg:#1a1a1e;--card:#ffffff;--muted:#6a6a76;--line:#e2e2e8;
    --accent:#3468c0;--green:#1a7f37;--yellow:#c48a00;--red:#c0392b;
    --up:#c0392b;--down:#1a7f37;      /* 台股慣例：紅漲綠跌 */
    --grid:#e6e6ec;--radar1:#3468c0;--radar2:#c0392b;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0f0f13;--fg:#ececf0;--card:#1a1a20;--muted:#9a9aa6;--line:#2c2c36;--grid:#2c2c36;}
  }
  :root[data-theme="dark"]{--bg:#0f0f13;--fg:#ececf0;--card:#1a1a20;--muted:#9a9aa6;--line:#2c2c36;--grid:#2c2c36;}
  :root[data-theme="light"]{--bg:#f6f7f9;--fg:#1a1a1e;--card:#ffffff;--muted:#6a6a76;--line:#e2e2e8;--grid:#e6e6ec;}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
       margin:0 auto;padding:24px 16px;line-height:1.55;max-width:1000px}
  h1{font-size:1.5em;margin:0 0 4px}
  .lead{color:var(--muted);font-size:.86em;margin-bottom:20px}
  .warn{background:linear-gradient(90deg,rgba(192,57,43,.12),transparent);border-left:4px solid var(--red);
        border-radius:8px;padding:12px 16px;margin-bottom:22px;font-size:.95em}
  .warn b{color:var(--red)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .grid2 .card:only-child{grid-column:1 / -1;max-width:520px}
  .stock-h{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:4px}
  .stock-h .name{font-size:1.15em;font-weight:700}
  .stock-h .price{font-size:1.4em;font-weight:800}
  .price.up,.chg{color:var(--up)} .price.down{color:var(--down)}
  .price .chg{font-size:.6em}
  .up{color:var(--up)} .down{color:var(--down)}
  .chip{display:inline-block;font-size:.72em;padding:2px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted);margin-left:6px}
  .chip.ok{border-color:var(--green);color:var(--green)}
  .chip.no{border-color:var(--red);color:var(--red)}
  .verdict{font-size:.9em;color:var(--muted);margin-bottom:12px}
  svg{width:100%;height:auto;display:block}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:.86em;margin-top:10px}
  .kv .k{color:var(--muted)}
  .kv .v{text-align:right;font-variant-numeric:tabular-nums}
  .sec-title{font-size:.78em;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin:16px 0 6px}
  .radar-grid{fill:none;stroke:var(--grid);stroke-width:1}
  .radar-axis{stroke:var(--grid);stroke-width:1}
  .radar-lbl{fill:var(--fg);font-size:11px;text-anchor:middle}
  .radar-data{fill:rgba(52,104,192,.25);stroke:var(--radar1);stroke-width:2}
  .ladder-base{stroke:var(--line);stroke-width:2}
  .tick text{fill:var(--fg);font-size:10.5px;text-anchor:middle}
  .tick .p{font-weight:700;font-size:11.5px;font-variant-numeric:tabular-nums}
  .scen{font-size:.86em;margin:6px 0;padding-left:10px;border-left:3px solid var(--line)}
  .scen.long{border-color:var(--up)} .scen.short{border-color:var(--down)}
  .scen b{font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:.84em;margin-top:4px}
  th,td{padding:7px 8px;text-align:left;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  th{color:var(--muted);font-weight:600;font-size:.92em}
  td.hl-up{color:var(--up);font-weight:600} td.hl-down{color:var(--down);font-weight:600}
  .verdict-final{font-size:.88em;margin-top:12px;color:var(--fg)}
  .verdict-final b{color:var(--fg)}
  .badge{display:inline-block;padding:1px 7px;border-radius:5px;font-size:.82em;font-weight:600}
  .b-y{background:rgba(196,138,0,.16);color:var(--yellow)}
  .b-r{background:rgba(192,57,43,.16);color:var(--red)}
  .b-g{background:rgba(26,127,55,.16);color:var(--green)}
  .foot{color:var(--muted);font-size:.76em;border-top:1px solid var(--line);padding-top:12px;margin-top:8px;line-height:1.6}
</style>
</head>
<body>

<h1>{{TITLE}}</h1>
<div class="lead">{{LEAD}}</div>

{{WARN_HTML}}

<div class="grid2">
{{CARD_A}}
{{CARD_B}}
</div>

{{COMPARE_SECTION}}

<div class="foot">{{FOOT}}</div>

<script>
  // 若被 claude.ai 嵌入則跟隨其 data-theme；否則走 prefers-color-scheme
  (function(){try{document.documentElement.getAttribute('data-theme');}catch(e){}})();
</script>
</body>
</html>
